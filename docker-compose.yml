services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Пробрасываем основной конфиг
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Пробрасываем конфиги хостов
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Пробрасываем логи на хост
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - app_network
    restart: always

  backend:
    build: ./backend # Путь к Dockerfile бэкенда
    container_name: backend_app
    # Порты наружу не выставляем, они будут доступны только внутри сети для Nginx
    expose:
      - "8080"
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge